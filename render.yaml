services:
  # ── Backend Web Service ─────────────────────────────────────────
  - type: web
    name: ese-aifsd
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.1-8b-instruct:free
      # Set these manually in Render dashboard (secrets):
      # MONGODB_URI, JWT_SECRET, OPENROUTER_API_KEY, FRONTEND_URL

  # ── Frontend Static Site ────────────────────────────────────────
  - type: web
    name: ese-aifsd-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://ese-aifsd-nnkx.onrender.com/api
      # FRONTEND_URL on backend service must be: https://ese-aifsd-frontend-vlff.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
